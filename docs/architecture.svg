<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" font-family="system-ui, -apple-system, Helvetica Neue, Arial, sans-serif">

  <!-- Background -->
  <rect width="1200" height="700" fill="#FFFFFF"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- SWIMLANE BACKGROUNDS                                    -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- INPUT swimlane -->
  <rect x="0" y="40" width="1200" height="120" fill="#F0F4FF" rx="0"/>
  <text x="16" y="100" font-size="12" font-weight="600" fill="#6B7280" transform="rotate(-90,16,100)" text-anchor="middle" dominant-baseline="middle">INPUT</text>

  <!-- PIPELINE swimlane -->
  <rect x="0" y="160" width="1200" height="270" fill="#FAFAFA" rx="0"/>
  <text x="16" y="295" font-size="12" font-weight="600" fill="#6B7280" transform="rotate(-90,16,295)" text-anchor="middle" dominant-baseline="middle">PIPELINE</text>

  <!-- DATA LAYER swimlane -->
  <rect x="0" y="430" width="1200" height="180" fill="#F0FDF4" rx="0"/>
  <text x="16" y="520" font-size="12" font-weight="600" fill="#6B7280" transform="rotate(-90,16,520)" text-anchor="middle" dominant-baseline="middle">DATA LAYER</text>

  <!-- Swimlane dividers -->
  <line x1="30" y1="40" x2="1200" y2="40" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="30" y1="160" x2="1200" y2="160" stroke="#E5E7EB" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="30" y1="430" x2="1200" y2="430" stroke="#E5E7EB" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="30" y1="610" x2="1200" y2="610" stroke="#E5E7EB" stroke-width="1"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- INPUT BOX                                               -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="50" y="58" width="280" height="84" rx="8" fill="#EEF2FF" stroke="#A5B4FC" stroke-width="1.5"/>
  <text x="190" y="78" text-anchor="middle" font-size="11" font-weight="700" fill="#312E81">Free-text Patient Profile</text>
  <text x="190" y="96" text-anchor="middle" font-size="9.5" fill="#4B5563" font-style="italic">"68F, platinum-resistant BRCA1+ ovarian cancer,</text>
  <text x="190" y="110" text-anchor="middle" font-size="9.5" fill="#4B5563" font-style="italic">2 prior lines, ECOG 1, no prior PARP inhibitor"</text>
  <text x="190" y="127" text-anchor="middle" font-size="9" fill="#6B7280">Free text → structured pipeline</text>

  <!-- Arrow: input box → parse node -->
  <line x1="190" y1="142" x2="190" y2="173" stroke="#9CA3AF" stroke-width="1.5"/>
  <polygon points="190,173 185,163 195,163" fill="#9CA3AF"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- PIPELINE NODES                                          -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- ── Node 1: PARSE ── -->
  <rect x="50" y="178" width="200" height="110" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <rect x="50" y="178" width="200" height="28" rx="8" fill="#3B82F6"/>
  <rect x="50" y="196" width="200" height="10" fill="#3B82F6"/>
  <text x="150" y="197" text-anchor="middle" font-size="12" font-weight="700" fill="white">Parser Agent</text>
  <text x="150" y="220" text-anchor="middle" font-size="10" fill="#1D4ED8" font-weight="600">LLaMA 3 via Ollama</text>
  <text x="150" y="237" text-anchor="middle" font-size="9.5" fill="#374151">Extracts: cancer type,</text>
  <text x="150" y="251" text-anchor="middle" font-size="9.5" fill="#374151">biomarkers, prior tx,</text>
  <text x="150" y="265" text-anchor="middle" font-size="9.5" fill="#374151">ECOG, age · Pydantic validated</text>

  <!-- Arrow: parse → retrieve -->
  <line x1="250" y1="233" x2="305" y2="233" stroke="#6B7280" stroke-width="2"/>
  <polygon points="305,233 295,228 295,238" fill="#6B7280"/>

  <!-- ── Node 2: RETRIEVE (LARGER) ── -->
  <rect x="305" y="168" width="310" height="230" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2.5"/>
  <rect x="305" y="168" width="310" height="30" rx="8" fill="#8B5CF6"/>
  <rect x="305" y="186" width="310" height="12" fill="#8B5CF6"/>
  <text x="460" y="189" text-anchor="middle" font-size="12" font-weight="700" fill="white">3-Stage Hybrid Retrieval</text>
  <text x="460" y="217" text-anchor="middle" font-size="10" fill="#5B21B6" font-weight="600">64,920 oncology trials · ClinicalTrials.gov</text>

  <!-- Stage boxes inside retrieve -->
  <rect x="320" y="228" width="280" height="30" rx="5" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
  <text x="460" y="241" text-anchor="middle" font-size="10" font-weight="600" fill="#4C1D95">Stage 1 — SQL Pre-filter</text>
  <text x="460" y="253" text-anchor="middle" font-size="9" fill="#6D28D9">64,920 → ~6,900 trials  ·  0.08s</text>

  <line x1="460" y1="258" x2="460" y2="268" stroke="#8B5CF6" stroke-width="1.5"/>
  <polygon points="460,268 456,261 464,261" fill="#8B5CF6"/>

  <rect x="320" y="268" width="280" height="30" rx="5" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
  <text x="460" y="281" text-anchor="middle" font-size="10" font-weight="600" fill="#4C1D95">Stage 2 — PubMedBERT FAISS</text>
  <text x="460" y="293" text-anchor="middle" font-size="9" fill="#6D28D9">bi-encoder → top 500 candidates</text>

  <line x1="460" y1="298" x2="460" y2="308" stroke="#8B5CF6" stroke-width="1.5"/>
  <polygon points="460,308 456,301 464,301" fill="#8B5CF6"/>

  <rect x="320" y="308" width="280" height="30" rx="5" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
  <text x="460" y="321" text-anchor="middle" font-size="10" font-weight="600" fill="#4C1D95">Stage 3 — MS-MARCO Cross-encoder</text>
  <text x="460" y="333" text-anchor="middle" font-size="9" fill="#6D28D9">rerank → top 10</text>

  <text x="460" y="365" text-anchor="middle" font-size="9" fill="#7C3AED" font-style="italic">Key finding: SQL filter is a quality gate,</text>
  <text x="460" y="377" text-anchor="middle" font-size="9" fill="#7C3AED" font-style="italic">not a speed optimization (doubles P@5 + MRR)</text>

  <!-- Arrow: retrieve → explain -->
  <line x1="615" y1="283" x2="670" y2="283" stroke="#6B7280" stroke-width="2"/>
  <polygon points="670,283 660,278 660,288" fill="#6B7280"/>

  <!-- ── Node 3: EXPLAIN ── -->
  <rect x="670" y="178" width="210" height="190" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <rect x="670" y="178" width="210" height="28" rx="8" fill="#10B981"/>
  <rect x="670" y="196" width="210" height="10" fill="#10B981"/>
  <text x="775" y="197" text-anchor="middle" font-size="12" font-weight="700" fill="white">Explanation Agent</text>
  <text x="775" y="220" text-anchor="middle" font-size="10" fill="#065F46" font-weight="600">LLaMA 3 via Ollama</text>
  <text x="775" y="238" text-anchor="middle" font-size="9.5" fill="#374151">Chain-of-thought eligibility</text>
  <text x="775" y="252" text-anchor="middle" font-size="9.5" fill="#374151">reasoning per trial</text>
  <text x="775" y="270" text-anchor="middle" font-size="9.5" fill="#374151">Computed confidence scoring</text>
  <text x="775" y="284" text-anchor="middle" font-size="9.5" fill="#374151">(penalty-based, 8 signals)</text>
  <text x="775" y="302" text-anchor="middle" font-size="9.5" fill="#374151">Provenance citations</text>
  <text x="775" y="316" text-anchor="middle" font-size="9.5" fill="#374151">SELF-RAG uncertainty flags</text>
  <text x="775" y="352" text-anchor="middle" font-size="9" fill="#6EE7B7" font-style="italic">~20s / trial · 10 trials total</text>

  <!-- Arrow: explain → output -->
  <line x1="880" y1="273" x2="935" y2="273" stroke="#6B7280" stroke-width="2"/>
  <polygon points="935,273 925,268 925,278" fill="#6B7280"/>

  <!-- ── Node 4: OUTPUT ── -->
  <rect x="935" y="188" width="220" height="190" rx="8" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
  <rect x="935" y="188" width="220" height="28" rx="8" fill="#F59E0B"/>
  <rect x="935" y="206" width="220" height="10" fill="#F59E0B"/>
  <text x="1045" y="207" text-anchor="middle" font-size="12" font-weight="700" fill="white">Ranked Trial Matches</text>
  <text x="1045" y="232" text-anchor="middle" font-size="10" fill="#92400E" font-weight="600">Structured output per trial</text>

  <text x="950" y="252" font-size="9.5" fill="#374151">• ELIGIBLE / INELIGIBLE / UNCERTAIN</text>
  <text x="950" y="268" font-size="9.5" fill="#374151">• Confidence: HIGH / MEDIUM / LOW</text>
  <text x="950" y="284" font-size="9.5" fill="#374151">• Human review flag (⚠️)</text>
  <text x="950" y="300" font-size="9.5" fill="#374151">• Inclusion criteria met/failed</text>
  <text x="950" y="316" font-size="9.5" fill="#374151">• Exclusion flags</text>
  <text x="950" y="332" font-size="9.5" fill="#374151">• Provenance citations</text>
  <text x="950" y="348" font-size="9.5" fill="#374151">• ClinicalTrials.gov link</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- DATA LAYER BOXES                                        -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- SQLite DB -->
  <rect x="270" y="448" width="190" height="80" rx="8" fill="#F0FDF4" stroke="#34D399" stroke-width="1.5"/>
  <text x="365" y="470" text-anchor="middle" font-size="11" font-weight="700" fill="#065F46">SQLite DB</text>
  <text x="365" y="487" text-anchor="middle" font-size="9.5" fill="#374151">64,920 oncology trials</text>
  <text x="365" y="502" text-anchor="middle" font-size="9.5" fill="#374151">chunk_text · eligibility_text</text>
  <text x="365" y="517" text-anchor="middle" font-size="9" fill="#6B7280">ClinicalTrials.gov API v2</text>

  <!-- FAISS Index -->
  <rect x="490" y="448" width="190" height="80" rx="8" fill="#F0FDF4" stroke="#34D399" stroke-width="1.5"/>
  <text x="585" y="470" text-anchor="middle" font-size="11" font-weight="700" fill="#065F46">FAISS Flat IP Index</text>
  <text x="585" y="487" text-anchor="middle" font-size="9.5" fill="#374151">PubMedBERT embeddings</text>
  <text x="585" y="502" text-anchor="middle" font-size="9.5" fill="#374151">64,920 × 768 dimensions</text>
  <text x="585" y="517" text-anchor="middle" font-size="9" fill="#6B7280">neuml/pubmedbert-base-embeddings</text>

  <!-- Cross-encoder -->
  <rect x="710" y="448" width="190" height="80" rx="8" fill="#F0FDF4" stroke="#34D399" stroke-width="1.5"/>
  <text x="805" y="470" text-anchor="middle" font-size="11" font-weight="700" fill="#065F46">Cross-encoder</text>
  <text x="805" y="487" text-anchor="middle" font-size="9.5" fill="#374151">ms-marco-MiniLM-L-6-v2</text>
  <text x="805" y="502" text-anchor="middle" font-size="9.5" fill="#374151">pairwise relevance scoring</text>
  <text x="805" y="517" text-anchor="middle" font-size="9" fill="#6B7280">HuggingFace / sentence-transformers</text>

  <!-- Dashed lines from data layer → retrieve node -->
  <line x1="365" y1="448" x2="430" y2="398" stroke="#34D399" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="585" y1="448" x2="500" y2="398" stroke="#34D399" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="805" y1="448" x2="570" y2="398" stroke="#34D399" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- EVAL RESULTS BOX (bottom right)                         -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="930" y="440" width="250" height="148" rx="8" fill="#FAFAFA" stroke="#D1D5DB" stroke-width="1.5"/>
  <rect x="930" y="440" width="250" height="24" rx="8" fill="#1F2937"/>
  <rect x="930" y="452" width="250" height="12" fill="#1F2937"/>
  <text x="1055" y="456" text-anchor="middle" font-size="10" font-weight="700" fill="white">Benchmark Results</text>
  <text x="1055" y="470" text-anchor="middle" font-size="8.5" fill="#6B7280">10-query oncology · 14 verified labels</text>
  <line x1="945" y1="477" x2="1165" y2="477" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Header row -->
  <text x="948" y="489" font-size="8.5" font-weight="600" fill="#374151">Config</text>
  <text x="1080" y="489" font-size="8.5" font-weight="600" fill="#374151" text-anchor="middle">P@5</text>
  <text x="1140" y="489" font-size="8.5" font-weight="600" fill="#374151" text-anchor="middle">MRR</text>
  <line x1="945" y1="493" x2="1165" y2="493" stroke="#E5E7EB" stroke-width="0.8"/>

  <!-- Config A -->
  <text x="948" y="505" font-size="8.5" fill="#6B7280">A — Bi-encoder only</text>
  <text x="1080" y="505" font-size="8.5" fill="#6B7280" text-anchor="middle">0.000</text>
  <text x="1140" y="505" font-size="8.5" fill="#6B7280" text-anchor="middle">0.000</text>

  <!-- Config B -->
  <text x="948" y="520" font-size="8.5" fill="#6B7280">B — + CE rerank</text>
  <text x="1080" y="520" font-size="8.5" fill="#6B7280" text-anchor="middle">0.020</text>
  <text x="1140" y="520" font-size="8.5" fill="#6B7280" text-anchor="middle">0.039</text>

  <!-- Config C — highlighted -->
  <rect x="942" y="525" width="226" height="16" rx="3" fill="#DCFCE7"/>
  <text x="948" y="537" font-size="8.5" font-weight="700" fill="#065F46">C — Hybrid (ours) ✓</text>
  <text x="1080" y="537" font-size="8.5" font-weight="700" fill="#065F46" text-anchor="middle">0.040</text>
  <text x="1140" y="537" font-size="8.5" font-weight="700" fill="#065F46" text-anchor="middle">0.084</text>

  <line x1="945" y1="545" x2="1165" y2="545" stroke="#E5E7EB" stroke-width="0.8"/>

  <!-- LLM comparison footnote -->
  <text x="948" y="558" font-size="8" fill="#6B7280">LLaMA 3 vs Mistral: 4.2× faster · 0.55 vs 0.76</text>
  <text x="948" y="570" font-size="8" fill="#6B7280">ELIGIBLE rate · LLaMA 3 selected as default</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- TITLE / FOOTER                                          -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <text x="600" y="22" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">TrialCompass — Agentic RAG Pipeline for Oncology Clinical Trial Matching</text>
  <text x="600" y="690" text-anchor="middle" font-size="9" fill="#9CA3AF">64,920 oncology trials · ClinicalTrials.gov API v2 · LangGraph linear state machine · Pranav Vishnuvajjhula 2026</text>

</svg>
